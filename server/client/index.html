<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>카드마블 - 연금술사의 여정</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 로비 -->
  <div id="lobby-screen" class="screen active">
    <div class="lobby-box">
      <div class="lobby-deco top"></div>
      <h1>⚗️ 카드마블</h1>
      <p class="subtitle">초보 연금술사의 여정</p>
      <input id="player-name" type="text" placeholder="연금술사 이름 입력" maxlength="10">
      <div class="lobby-buttons">
        <button id="btn-create">방 만들기</button>
        <button id="btn-join">방 입장</button>
      </div>
      <div id="join-row" style="display:none">
        <input id="room-id-input" type="text" placeholder="방 코드 입력" maxlength="5">
        <button id="btn-join-confirm">입장</button>
      </div>
      <p id="lobby-error" class="error-msg"></p>
      <div class="lobby-deco bottom"></div>
    </div>
  </div>

  <!-- 대기실 -->
  <div id="waiting-screen" class="screen">
    <div class="waiting-box">
      <h2>⚗️ 연금술사 대기실</h2>
      <div class="room-code-display">방 코드: <span id="room-code-text">-----</span></div>
      <ul id="player-list"></ul>
      <button id="btn-start" style="display:none">실험 시작!</button>
      <p id="waiting-msg" class="muted">✦ 다른 연금술사를 기다리는 중... ✦</p>
    </div>
  </div>

  <!-- 게임 화면 -->
  <div id="game-screen" class="screen">
    <div id="game-layout">

      <!-- 보드 영역 -->
      <div id="board-area">
        <div id="board-wrap">
          <!-- 위변 + 모서리 (27, 26~19, 18) -->
          <div class="board-row top-row">
            <div class="cell corner" id="cell-27"></div>
            <div class="cell" id="cell-26"></div>
            <div class="cell" id="cell-25"></div>
            <div class="cell" id="cell-24"></div>
            <div class="cell" id="cell-23"></div>
            <div class="cell" id="cell-22"></div>
            <div class="cell" id="cell-21"></div>
            <div class="cell" id="cell-20"></div>
            <div class="cell" id="cell-19"></div>
            <div class="cell corner" id="cell-18"></div>
          </div>

          <!-- 중간 행 -->
          <div class="board-row mid-row">
            <!-- 왼변 (28~35) -->
            <div class="board-col left-col">
              <div class="cell side" id="cell-28"></div>
              <div class="cell side" id="cell-29"></div>
              <div class="cell side" id="cell-30"></div>
              <div class="cell side" id="cell-31"></div>
              <div class="cell side" id="cell-32"></div>
              <div class="cell side" id="cell-33"></div>
              <div class="cell side" id="cell-34"></div>
              <div class="cell side" id="cell-35"></div>
            </div>

            <!-- 중앙 마법진 -->
            <div id="board-center">
              <div id="magic-circle">
                <div class="magic-ring ring1"></div>
                <div class="magic-ring ring2"></div>
                <div class="magic-ring ring3"></div>
                <div class="magic-star">✦</div>
                <div class="magic-title">⚗️</div>
                <div class="magic-subtitle">카드마블</div>
              </div>
            </div>

            <!-- 오른변 (17~10) -->
            <div class="board-col right-col">
              <div class="cell side" id="cell-17"></div>
              <div class="cell side" id="cell-16"></div>
              <div class="cell side" id="cell-15"></div>
              <div class="cell side" id="cell-14"></div>
              <div class="cell side" id="cell-13"></div>
              <div class="cell side" id="cell-12"></div>
              <div class="cell side" id="cell-11"></div>
              <div class="cell side" id="cell-10"></div>
            </div>
          </div>

          <!-- 아래변 + 모서리 (0, 1~8, 9) -->
          <div class="board-row bottom-row">
            <div class="cell corner" id="cell-0"></div>
            <div class="cell" id="cell-1"></div>
            <div class="cell" id="cell-2"></div>
            <div class="cell" id="cell-3"></div>
            <div class="cell" id="cell-4"></div>
            <div class="cell" id="cell-5"></div>
            <div class="cell" id="cell-6"></div>
            <div class="cell" id="cell-7"></div>
            <div class="cell" id="cell-8"></div>
            <div class="cell corner" id="cell-9"></div>
          </div>
        </div>
      </div>

      <!-- 사이드 패널 -->
      <div id="side-panel">
        <div id="turn-banner">대기 중...</div>
        <div id="player-info-list"></div>
        <div id="log-box"></div>
        <div id="hand-area">
          <div id="hand-label">✦ 손패</div>
          <div id="inventory"></div>
          <div id="hand-cards"></div>
          <div id="action-buttons">
            <button id="btn-draw">카드 드로우</button>
          </div>
          <div id="potion-banner" style="display:none">
            <p>🧪 물약 찬스! 카드를 1장 더 버릴 수 있습니다.</p>
            <button id="btn-potion-pass">패스</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 결과 -->
  <div id="result-screen" class="screen">
    <div class="result-box">
      <h2 id="result-title">실험 완료!</h2>
      <p id="result-winner"></p>
      <button id="btn-restart">다시 도전</button>
    </div>
  </div>

  <!-- 아이템 상점 모달 -->
  <div id="shop-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); align-items:center; justify-content:center; z-index:100;">
    <div class="shop-modal-inner">
      <h3 class="shop-title">🏪 아이템 상점</h3>
      <p class="shop-desc-text">아이템 1개를 선택하세요</p>
      <div id="shop-item-list"></div>
      <button class="shop-pass-btn" onclick="socket.emit('skip-shop'); document.getElementById('shop-modal').style.display='none';">패스</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/board.js"></script>
  <script src="js/hand.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
