<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>카드마블 - 연금술사의 여정</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 로비 -->
  <div id="lobby-screen" class="screen active">
    <div class="lobby-box">
      <div class="lobby-deco top"></div>
      <h1>⚗️ 카드마블</h1>
      <p class="subtitle">초보 연금술사의 여정</p>
      <input id="player-name" type="text" placeholder="연금술사 이름 입력" maxlength="10">
      <div class="lobby-buttons">
        <button id="btn-create">방 만들기</button>
        <button id="btn-join">방 입장</button>
      </div>
      <div id="join-row" style="display:none">
        <input id="room-id-input" type="text" placeholder="방 코드 입력" maxlength="5">
        <button id="btn-join-confirm">입장</button>
      </div>
      <p id="lobby-error" class="error-msg"></p>
      <div class="lobby-deco bottom"></div>
    </div>
  </div>

  <!-- 대기실 -->
  <div id="waiting-screen" class="screen">
    <div class="waiting-box">
      <h2>⚗️ 연금술사 대기실</h2>
      <div class="room-code-display">방 코드: <span id="room-code-text">-----</span></div>
      <ul id="player-list"></ul>
      <button id="btn-start" style="display:none">실험 시작!</button>
      <p id="waiting-msg" class="muted">✦ 다른 연금술사를 기다리는 중... ✦</p>
    </div>
  </div>

  <!-- 게임 화면 -->
  <div id="game-screen" class="screen">
    <div id="game-layout">
      <div id="board-area">
        <div id="board-wrap">

          <!-- 위변: 15, 14~11, 10 -->
          <div class="board-row top-row">
            <div class="cell corner" id="cell-15"></div>
            <div class="cell" id="cell-14"></div>
            <div class="cell" id="cell-13"></div>
            <div class="cell" id="cell-12"></div>
            <div class="cell" id="cell-11"></div>
            <div class="cell corner" id="cell-10"></div>
          </div>

          <!-- 중간 -->
          <div class="board-row mid-row">
            <div class="board-col left-col">
              <div class="cell side" id="cell-16"></div>
              <div class="cell side" id="cell-17"></div>
              <div class="cell side" id="cell-18"></div>
              <div class="cell side" id="cell-19"></div>
            </div>
            <div id="board-center">
              <div id="magic-circle">
                <div class="magic-ring ring1"></div>
                <div class="magic-ring ring2"></div>
                <div class="magic-ring ring3"></div>
                <div class="magic-star">✦</div>
                <div class="magic-title">⚗️</div>
                <div class="magic-subtitle">카드마블</div>
              </div>
            </div>
            <div class="board-col right-col">
              <div class="cell side" id="cell-9"></div>
              <div class="cell side" id="cell-8"></div>
              <div class="cell side" id="cell-7"></div>
              <div class="cell side" id="cell-6"></div>
            </div>
          </div>

          <!-- 아래변: 0, 1~4, 5 -->
          <div class="board-row bottom-row">
            <div class="cell corner" id="cell-0"></div>
            <div class="cell" id="cell-1"></div>
            <div class="cell" id="cell-2"></div>
            <div class="cell" id="cell-3"></div>
            <div class="cell" id="cell-4"></div>
            <div class="cell corner" id="cell-5"></div>
          </div>
        </div>
      </div>

      <!-- 사이드 패널 -->
      <div id="side-panel">
        <div id="turn-banner">대기 중...</div>
        <div id="player-info-list"></div>
        <div id="log-box"></div>
        <div id="hand-area">
          <div id="hand-label">✦ 손패</div>
          <div id="inventory"></div>
          <div id="hand-cards"></div>
          <div id="action-buttons">
            <button id="btn-draw">카드 드로우</button>
          </div>
          <div id="potion-banner" style="display:none">
            <p>🔮 수정구슬! 버릴 카드를 선택하세요.</p>
            <button id="btn-potion-pass">패스</button>
          </div>
          <div id="alch-boost-banner" style="display:none">
            <p>✨ 연금술 촉진! 버릴 카드를 선택하세요.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 결과 -->
  <div id="result-screen" class="screen">
    <div class="result-box">
      <h2 id="result-title">실험 완료!</h2>
      <p id="result-winner"></p>
      <button id="btn-restart">다시 도전</button>
    </div>
  </div>

  <!-- 플레이어 타겟 선택 모달 -->
  <div id="target-select-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); align-items:center; justify-content:center; z-index:200;">
    <div class="cell-desc-inner">
      <div class="cell-desc-title" id="target-select-title"></div>
      <div id="target-select-list" style="display:flex; flex-direction:column; gap:.6rem; margin:1rem 0;"></div>
    </div>
  </div>

  <!-- 재료 경고 팝업 -->
  <div id="ingredient-warning-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); align-items:center; justify-content:center; z-index:200;">
    <div class="warning-inner">
      <div style="font-size:2.5rem; margin-bottom:.5rem;">⚠️</div>
      <div id="ingredient-warning-text" style="color:#FFE4B5; font-size:1rem; line-height:1.5;"></div>
    </div>
  </div>

  <!-- 칸 설명 팝업 -->
  <div id="cell-desc-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); align-items:center; justify-content:center; z-index:200;">
    <div class="cell-desc-inner">
      <div class="cell-desc-icon" id="cell-desc-icon"></div>
      <div class="cell-desc-title" id="cell-desc-title"></div>
      <div class="cell-desc-text" id="cell-desc-text"></div>
      <button id="cell-desc-close">닫기</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/board.js"></script>
  <script src="js/hand.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
